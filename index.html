<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Checker</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
}

.container{
    background:white;
    width:350px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#2563eb;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.bar{
    width:100%;
    height:12px;
    background:#ddd;
    border-radius:10px;
    margin-top:15px;
    overflow:hidden;
}

.progress{
    height:100%;
    width:0%;
    border-radius:10px;
    transition:0.4s;
}

.text{
    margin-top:12px;
    font-weight:bold;
    text-align:center;
}

.tip{
    margin-top:15px;
    font-size:14px;
    color:#555;
    text-align:center;
}

</style>
</head>

<body>

<div class="container">

    <h2>Password Strength</h2>

    <input type="password"
    id="password"
    placeholder="Enter Password"
    onkeyup="checkPassword()">

    <div class="bar">
        <div class="progress" id="progress"></div>
    </div>

    <div class="text" id="strengthText">Type Password</div>

    <div class="tip">
        Use uppercase, lowercase, numbers & symbols
    </div>

</div>

<script>

function checkPassword(){

    let password =
    document.getElementById("password").value;

    let progress =
    document.getElementById("progress");

    let strengthText =
    document.getElementById("strengthText");

    let strength = 0;

    if(password.length >= 6){
        strength += 25;
    }

    if(/[A-Z]/.test(password)){
        strength += 25;
    }

    if(/[0-9]/.test(password)){
        strength += 25;
    }

    if(/[^A-Za-z0-9]/.test(password)){
        strength += 25;
    }

    progress.style.width = strength + "%";

    if(strength <= 25){
        progress.style.background = "red";
        strengthText.innerHTML = "Weak Password";
    }

    else if(strength <= 50){
        progress.style.background = "orange";
        strengthText.innerHTML = "Medium Password";
    }

    else if(strength <= 75){
        progress.style.background = "gold";
        strengthText.innerHTML = "Good Password";
    }

    else{
        progress.style.background = "green";
        strengthText.innerHTML = "Strong Password";
    }

}

</script>

</body>
</html>
